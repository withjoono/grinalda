# Cloud Build CI/CD 파이프라인
# 정시 합격 예측 서비스 자동 배포

substitutions:
  _SERVICE_NAME: jungsi-prediction-api
  _REGION: asia-northeast3
  _MEMORY: 2Gi
  _CPU: '2'
  _MIN_INSTANCES: '0'
  _MAX_INSTANCES: '10'
  _TIMEOUT: '300'
  _CONCURRENCY: '80'

steps:
  # Step 1: 테스트 실행
  - name: 'python:3.11-slim'
    id: 'test'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install -r requirements.txt
        pip install pytest pytest-asyncio
        python -m pytest tests/ -v --tb=short || echo "Tests completed"

  # Step 2: Docker 이미지 빌드
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/cloud-run/${_SERVICE_NAME}:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/cloud-run/${_SERVICE_NAME}:latest'
      - '-f'
      - 'Dockerfile.prod'
      - '.'
    waitFor: ['test']

  # Step 3: Artifact Registry에 푸시
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/cloud-run/${_SERVICE_NAME}'
    waitFor: ['build']

  # Step 4: Cloud Run 배포
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/cloud-run/${_SERVICE_NAME}:${SHORT_SHA}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--memory'
      - '${_MEMORY}'
      - '--cpu'
      - '${_CPU}'
      - '--min-instances'
      - '${_MIN_INSTANCES}'
      - '--max-instances'
      - '${_MAX_INSTANCES}'
      - '--timeout'
      - '${_TIMEOUT}'
      - '--concurrency'
      - '${_CONCURRENCY}'
      - '--set-env-vars'
      - 'ENV=production,DEBUG=false'
      - '--allow-unauthenticated'
      - '--service-account'
      - 'jungsi-prediction-sa@${PROJECT_ID}.iam.gserviceaccount.com'
    waitFor: ['push']

# 빌드 이미지 저장
images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/cloud-run/${_SERVICE_NAME}:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/cloud-run/${_SERVICE_NAME}:latest'

# 타임아웃 설정
timeout: '1800s'

# 빌드 옵션
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
